<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aria - Your AI Companion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            color: #e0e0e0;
        }
        .container {
            width: 90%; max-width: 750px; height: 90vh;
            display: flex; flex-direction: column;
            background: rgba(255,255,255,0.05);
            border-radius: 24px; border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }
        .mood-bar {
            padding: 10px 20px; font-size: 13px;
            color: rgba(255,255,255,0.6);
            background: rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: space-between;
        }
        .music-toggle {
            background: rgba(255,255,255,0.1); border: none; border-radius: 20px;
            padding: 4px 12px; color: white; font-size: 12px; cursor: pointer;
        }
        .header { padding: 16px 20px; text-align: center; }
        .header h1 { font-size: 22px; font-weight: 300; letter-spacing: 2px; color: #a78bfa; }
        .header p { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 4px; }
        .chat-area {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 16px;
        }
        .message {
            max-width: 80%; padding: 14px 18px; border-radius: 18px;
            line-height: 1.6; font-size: 15px;
        }
        .message.user {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            align-self: flex-end; border-bottom-right-radius: 4px;
        }
        .message.assistant {
            background: rgba(255,255,255,0.08);
            align-self: flex-start; border-bottom-left-radius: 4px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .strategy-card {
            background: rgba(167, 139, 250, 0.1);
            border: 1px solid rgba(167, 139, 250, 0.3);
            border-radius: 14px; padding: 14px; font-size: 13px;
            align-self: center; width: 90%;
        }
        .strategy-card h4 { color: #a78bfa; margin-bottom: 6px; font-size: 14px; }
        .strategy-card p { color: rgba(255,255,255,0.7); line-height: 1.5; }
        .input-area {
            padding: 16px; display: flex; gap: 10px;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .text-input {
            flex: 1; background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 24px;
            padding: 12px 20px; color: white; font-size: 14px;
            resize: none; max-height: 120px; outline: none;
        }
        .text-input::placeholder { color: rgba(255,255,255,0.3); }
        .send-btn {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none; border-radius: 50%; width: 46px; height: 46px;
            cursor: pointer; color: white; font-size: 18px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="mood-bar">
        <span id="moodText">Mood: neutral</span>
        <button class="music-toggle" id="musicBtn" onclick="toggleMusic()">Play Calm Music</button>
    </div>
    <div class="header">
        <h1>A R I A</h1>
        <p>your safe space - always here</p>
    </div>
    <div class="chat-area" id="chatArea">
        <div class="message assistant">
            Hi! I am Aria, your personal companion. This is your safe space. How are you feeling right now?
        </div>
    </div>
    <div class="input-area">
        <textarea class="text-input" id="messageInput" placeholder="Share what is on your mind..." rows="1" onkeydown="handleKeyDown(event)"></textarea>
        <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>
</div>

<audio id="bgMusic" loop>
    <source src="/static/audio/DeepSleep.mp3" type="audio/mpeg">
</audio>

<script>
    const USER_ID = "user_" + Math.random().toString(36).substr(2, 9);
    const SESSION_ID = "session_" + Date.now();
    const wsProtocol = window.location.protocol === "https:" ? "wss:" : "ws:";
    let ws = new WebSocket(wsProtocol + "//" + window.location.host + "/api/chat/ws/" + USER_ID + "/" + SESSION_ID);
    let currentMessageEl = null;
    let musicPlaying = false;

    function toggleMusic() {
        const audio = document.getElementById("bgMusic");
        const btn = document.getElementById("musicBtn");
        if (musicPlaying) {
            audio.pause();
            btn.textContent = "Play Calm Music";
        } else {
            audio.volume = 0.4;
            audio.play().catch(function(err) {
                alert("Could not play audio: " + err);
            });
            btn.textContent = "Pause Music";
        }
        musicPlaying = !musicPlaying;
    }

    ws.onmessage = function(event) {
        const data = JSON.parse(event.data);
        if (data.type === "mood") {
            document.getElementById("moodText").textContent = "Mood: " + data.data.mood;
        } else if (data.type === "chunk") {
            if (!currentMessageEl) {
                currentMessageEl = document.createElement("div");
                currentMessageEl.className = "message assistant";
                document.getElementById("chatArea").appendChild(currentMessageEl);
            }
            currentMessageEl.textContent += data.data;
            document.getElementById("chatArea").scrollTop = 999999;
        } else if (data.type === "done") {
            currentMessageEl = null;
            if (data.data.coping_strategy) {
                const card = document.createElement("div");
                card.className = "strategy-card";
                card.innerHTML = "<h4>Try: " + data.data.coping_strategy.name + "</h4><p>" + data.data.coping_strategy.steps + "</p>";
                document.getElementById("chatArea").appendChild(card);
            }
        }
    };

    function sendMessage() {
        const input = document.getElementById("messageInput");
        const message = input.value.trim();
        if (!message) return;
        const chatArea = document.getElementById("chatArea");
        const userDiv = document.createElement("div");
        userDiv.className = "message user";
        userDiv.textContent = message;
        chatArea.appendChild(userDiv);
        input.value = "";
        ws.send(JSON.stringify({ message: message }));
        chatArea.scrollTop = 999999;
    }

    function handleKeyDown(e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }
</script>
</body>
</html>
